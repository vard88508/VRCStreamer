<!doctype html>
<meta charset="utf-8">
<title>VRC Audio Streamer</title>

<label>Server <select id="serverSelect"><option value="">Loading...</option></select></label>
<br>
<span id="serverDescription"></span>
<br>
<span id="customServer" hidden>
  <label>Custom API <input id="customApi" size="64" autocomplete="off" spellcheck="false"></label>
  <br>
  <label>Custom RTSP <input id="customRtsp" size="64" autocomplete="off" spellcheck="false"></label>
  <br>
  <label>Custom password <input id="customPassword" type="password" size="32" autocomplete="off" spellcheck="false"></label>
  <br>
</span>
<label>URL <input id="rtspUrl" size="64" readonly></label>
<button id="newLink" type="button">New link</button>
<br>
<label>Encoder <select id="encoderMode">
  <option value="native192">🔊 Native AAC 192 kbps</option>
  <option value="wasm320">🔊 WASM AAC 320 kbps</option>
</select></label>
<br>
<label>Gain <input id="gain" type="number" min="0.25" max="4" step="0.25" value="1"></label>
<br>
<label><input id="forceMono" type="checkbox"> Force Mono</label>
<br>
<button id="mic" type="button">Stream microphone</button>
<button id="screen" type="button">Stream tab/system audio</button>
<button id="stop" type="button" disabled>Stop</button>
<br>
<span id="stats">Listeners: - Streams: -</span>
<pre id="status"></pre>

<script src="client.js"></script>
